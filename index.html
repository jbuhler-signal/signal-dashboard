async function unlock(pw){
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(IV)},key,dec(CT));
 return new TextDecoder().decode(buf);
}
document.getElementById('f').addEventListener('submit',async ev=>{

 b.disabled=true;e.textContent='';
 try{const html=await unlock(document.getElementById('pw').value);
   document.open();document.write(html);document.close();
 }catch(err){e.textContent='Incorrect password.';b.disabled=false;}
});
